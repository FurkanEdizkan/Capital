name: Bug report
description: Report something that isn't working
labels: ["type:fix"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - engine
        - web
        - infra / deployment
        - trading
        - auth
        - other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Logs / environment
      description: Relevant logs, trading mode (Sim/Testnet/Live), versions.
