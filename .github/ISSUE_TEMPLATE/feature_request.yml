name: Feature request
description: Suggest a feature or improvement
labels: ["type:feat"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What need or pain point does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - engine
        - web
        - infra / deployment
        - trading
        - ai
        - auth
        - other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
